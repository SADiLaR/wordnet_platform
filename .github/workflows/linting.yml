name: Linting

on:
  push:
    branches:
      - master
  pull_request:

permissions: read-all

jobs:
  test-linting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run linting tools
        run: |
          cd app/
          ruff format --diff .
          ruff check --diff .
