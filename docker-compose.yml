# This is  meant for local development, but should give an idea of what you
# can consider in production.

services:
  db:
    image: postgres:18
    container_name: sadilar-wordnet-db
    environment:
      - POSTGRES_DB=wordnet_db
      - POSTGRES_USER=sadilar
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  web:
    build:
      context: .
      dockerfile: Dockerfile-dev
    container_name: sadilar-wordnet-web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./app:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=True
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=wordnet_db  # see POSTGRES_DB above
      - DB_USER=sadilar  # see POSTGRES_USER above
      - DB_PASSWORD=${DB_PASSWORD} # see POSTGRES_PASSWORD above
volumes:
  postgres_data:
